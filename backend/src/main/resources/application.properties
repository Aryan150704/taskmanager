# ============================================
# Server Configuration
# ============================================
server.port=8080

# ============================================
# PostgreSQL Database Configuration
# FIX #3: Replaced YOUR_PASSWORD_HERE with actual password
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager
spring.datasource.username=postgres
spring.datasource.password=Aryan@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Prevent lazy loading issues outside transactions
spring.jpa.open-in-view=false

# ============================================
# JWT Configuration
# FIX #4: Secret must be >= 64 chars for HS512 (512 bits).
# Using a 64+ char secret ensures compatibility with all HMAC variants.
# ============================================
jwt.secret=TaskManager$SuperSecretKey!2024#ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnop
# Token valid for 24 hours (milliseconds)
jwt.expiration=86400000

# ============================================
# App Configuration
# ============================================
spring.application.name=taskmanager
